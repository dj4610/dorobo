<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorobo - AI Finance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; } 
        .glass { background: rgba(24, 24, 27, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.5); } 
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #facc15; }

        /* Custom Select Style */
        select option { background-color: #18181b; color: #f4f4f5; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen relative">

    <!-- Language Selector -->
    <div class="absolute top-4 right-4 z-[60]">
        <select id="lang-selector" class="bg-zinc-900 border border-zinc-700 text-yellow-400 text-sm font-semibold rounded-lg focus:ring-yellow-400 focus:border-yellow-400 block w-full p-2.5 outline-none cursor-pointer transition hover:border-yellow-500">
            <option value="id">🇮🇩 Indonesia</option>
            <option value="en">🇬🇧 English</option>
            <option value="zh">🇨🇳 中文 (Chinese)</option>
            <option value="ja">🇯🇵 日本語 (Japanese)</option>
            <option value="ru">🇷🇺 Русский (Russian)</option>
        </select>
    </div>

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="fixed inset-0 bg-[#09090b] z-50 flex flex-col items-center justify-center text-center px-4">
        <div class="max-w-md w-full glass p-8 rounded-3xl shadow-2xl border-t-4 border-t-yellow-400">
            
            <!-- Maskot Dorobo Login -->
            <img src="download.jpg" alt="Dorobo Mascot" class="w-32 h-32 mx-auto mb-4 rounded-full object-cover border-4 border-[#09090b] outline outline-4 outline-yellow-400 shadow-[0_0_20px_rgba(250,204,21,0.4)]">
            
            <h1 class="text-4xl font-black text-yellow-400 mb-2 tracking-wide">DOROBO</h1>
            <p id="t-subtitle" class="text-zinc-400 mb-8">Kendalikan keuanganmu. Jangan biarkan uangmu dicuri kebiasaan buruk.</p>
            <button id="btn-login" class="flex items-center justify-center w-full bg-yellow-400 text-black py-3 rounded-xl font-bold hover:bg-yellow-500 transition shadow-[0_0_15px_rgba(250,204,21,0.3)]">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-6 h-6 mr-3 bg-white rounded-full p-0.5" alt="Google">
                <span id="t-login">Masuk dengan Google</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="app-content" class="hidden max-w-6xl mx-auto pt-10 md:pt-4">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-zinc-800 pb-4 gap-4">
            <div class="flex items-center gap-4">
                <!-- Maskot Mini di Header -->
                <img src="download.jpg" alt="Dorobo Mascot Mini" class="w-14 h-14 rounded-full border-2 border-yellow-400 object-cover shadow-[0_0_10px_rgba(250,204,21,0.2)]">
                <div>
                    <h1 class="text-3xl font-black text-yellow-400 tracking-wider mb-0 leading-none">DOROBO</h1>
                    <h2 class="text-sm text-zinc-400 mt-1"><span id="t-hello">Halo,</span> <span id="user-name" class="font-bold text-white">Pengguna</span></h2>
                </div>
            </div>
            <button id="btn-logout" class="text-sm font-semibold text-yellow-500 hover:bg-zinc-800 px-4 py-2 rounded-lg transition border border-zinc-800 hover:border-yellow-500 w-full md:w-auto" data-i18n="logout">Keluar</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Stats Column -->
            <div class="lg:col-span-2 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="glass p-6 rounded-2xl relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-16 h-16 bg-yellow-400 opacity-10 rounded-bl-full"></div>
                        <p id="t-total" class="text-zinc-400 text-sm font-medium mb-1">Total Pengeluaran</p>
                        <p class="text-4xl font-black text-white" id="total-balance">0</p>
                    </div>
                    <div class="glass p-6 rounded-2xl border-l-4 border-yellow-400 flex flex-col justify-center">
                        <div class="flex items-center mb-2">
                            <span class="bg-yellow-400 text-black text-xs font-bold px-2 py-1 rounded uppercase tracking-wider mr-2">AI Insight</span>
                            <span class="text-yellow-400">⚡</span>
                        </div>
                        <p class="text-zinc-300 text-sm leading-relaxed" id="ai-suggestion">Menunggu data transaksi untuk dianalisis...</p>
                    </div>
                </div>

                <!-- Transaction Form -->
                <div class="glass p-6 rounded-2xl shadow-sm border border-zinc-800">
                    <h3 id="t-record" class="font-bold text-yellow-400 mb-4">Catat Transaksi Baru</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="desc" placeholder="Deskripsi (mis: Kopi)" class="bg-zinc-900 border border-zinc-700 text-white p-3 rounded-xl focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 outline-none placeholder-zinc-500 transition">
                        <input type="number" id="amount" placeholder="Jumlah" class="bg-zinc-900 border border-zinc-700 text-white p-3 rounded-xl focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 outline-none placeholder-zinc-500 transition">
                        <button onclick="addTransaction()" id="t-save" class="bg-yellow-400 text-black font-black py-3 rounded-xl hover:bg-yellow-500 transition shadow-[0_0_10px_rgba(250,204,21,0.2)] hover:shadow-[0_0_15px_rgba(250,204,21,0.4)] uppercase tracking-wide">Simpan</button>
                    </div>
                </div>

                <!-- Chart -->
                <div class="glass p-6 rounded-2xl shadow-sm border border-zinc-800">
                    <h3 id="t-chart" class="font-bold text-yellow-400 mb-4">Grafik Pengeluaran</h3>
                    <canvas id="financeChart" height="100"></canvas>
                </div>
            </div>

            <!-- List Column -->
            <div class="glass p-6 rounded-2xl h-fit border border-zinc-800">
                <h3 class="font-bold text-yellow-400 mb-4 flex justify-between items-center">
                    <span id="t-history">Riwayat Terbaru</span>
                    <span id="t-realtime" class="text-xs font-normal text-zinc-500 bg-zinc-900 px-2 py-1 rounded">Real-time</span>
                </h3>
                <div id="transaction-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                    <!-- Data will appear here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- TRANSLATION DICTIONARY ---
        const i18n = {
            id: {
                subtitle: "Kendalikan keuanganmu. Jangan biarkan uangmu dicuri kebiasaan buruk.",
                login: "Masuk dengan Google",
                hello: "Halo,",
                logout: "Keluar",
                total: "Total Pengeluaran",
                ai_waiting: "Menunggu data transaksi untuk dianalisis...",
                record: "Catat Transaksi Baru",
                desc_ph: "Deskripsi (mis: Kopi)",
                amount_ph: "Jumlah",
                save: "Simpan",
                chart: "Grafik Pengeluaran",
                history: "Riwayat Terbaru",
                realtime: "Real-time",
                currency: "Rp"
            },
            en: {
                subtitle: "Control your finances. Don't let bad habits steal your money.",
                login: "Sign in with Google",
                hello: "Hello,",
                logout: "Logout",
                total: "Total Expenses",
                ai_waiting: "Waiting for transaction data to analyze...",
                record: "Record New Transaction",
                desc_ph: "Description (e.g., Coffee)",
                amount_ph: "Amount",
                save: "Save",
                chart: "Expense Chart",
                history: "Recent History",
                realtime: "Real-time",
                currency: "$"
            },
            zh: {
                subtitle: "控制您的财务。不要让坏习惯偷走您的钱。",
                login: "使用 Google 登录",
                hello: "你好，",
                logout: "登出",
                total: "总支出",
                ai_waiting: "等待交易数据进行分析...",
                record: "记录新交易",
                desc_ph: "描述 (例如：咖啡)",
                amount_ph: "金额",
                save: "保存",
                chart: "支出图表",
                history: "最近记录",
                realtime: "实时",
                currency: "¥"
            },
            ja: {
                subtitle: "財務を管理する。悪い習慣にお金を盗まれないように。",
                login: "Google でログイン",
                hello: "こんにちは、",
                logout: "ログアウト",
                total: "総支出",
                ai_waiting: "分析するトランザクションデータを待っています...",
                record: "新しい取引を記録",
                desc_ph: "説明 (例：コーヒー)",
                amount_ph: "金額",
                save: "保存",
                chart: "支出チャート",
                history: "最近の履歴",
                realtime: "リアルタイム",
                currency: "¥"
            },
            ru: {
                subtitle: "Контролируйте свои финансы. Не позволяйте вредным привычкам красть ваши деньги.",
                login: "Войти через Google",
                hello: "Здравствуйте,",
                logout: "Выйти",
                total: "Общие расходы",
                ai_waiting: "Ожидание данных транзакций для анализа...",
                record: "Записать новую транзакцию",
                desc_ph: "Описание (например, Кофе)",
                amount_ph: "Сумма",
                save: "Сохранить",
                chart: "График расходов",
                history: "Недавняя история",
                realtime: "В реальном времени",
                currency: "₽"
            }
        };

        let currentLang = localStorage.getItem('dorobo_lang') || 'id';
        const langSelector = document.getElementById('lang-selector');
        langSelector.value = currentLang;

        function applyLanguage() {
            const t = i18n[currentLang];
            
            document.getElementById('t-subtitle').innerText = t.subtitle;
            document.getElementById('t-login').innerText = t.login;
            document.getElementById('t-hello').innerText = t.hello;
            document.getElementById('btn-logout').innerText = t.logout;
            document.getElementById('t-total').innerText = t.total;
            document.getElementById('t-record').innerText = t.record;
            document.getElementById('t-save').innerText = t.save;
            document.getElementById('t-chart').innerText = t.chart;
            document.getElementById('t-history').innerText = t.history;
            document.getElementById('t-realtime').innerText = t.realtime;
            
            document.getElementById('desc').placeholder = t.desc_ph;
            document.getElementById('amount').placeholder = t.amount_ph;

            const aiDisp = document.getElementById('ai-suggestion');
            if (aiDisp.innerText.includes('...') || transactions.length === 0) {
                aiDisp.innerText = t.ai_waiting;
            }

            document.documentElement.lang = currentLang;
            updateUI(); 
        }

        langSelector.addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('dorobo_lang', currentLang);
            applyLanguage();
        });

        // --- 1. FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyC71WCtUeWM-U2hAMESu-pTDxRScB5ZXJY",
            authDomain: "dorobo-d0846.firebaseapp.com",
            projectId: "dorobo-d0846",
            storageBucket: "dorobo-d0846.firebasestorage.app",
            messagingSenderId: "37873066551",
            appId: "1:37873066551:web:5777aa352ada9370cfd5b2",
            measurementId: "G-356QDLL560"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // --- 2. ELEMENTS ---
        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const authOverlay = document.getElementById('auth-overlay');
        const appContent = document.getElementById('app-content');
        const userNameDisp = document.getElementById('user-name');
        const listContainer = document.getElementById('transaction-list');
        const balanceDisp = document.getElementById('total-balance');
        const aiDisp = document.getElementById('ai-suggestion');

        let transactions = [];

        // --- 3. AUTH LOGIC ---
        btnLogin.onclick = () => {
            auth.signInWithPopup(provider).catch(error => {
                console.error("Login Error:", error);
                alert("Gagal login. Pastikan Anda menjalankan ini di Local Server (Live Server) atau sudah di-deploy ke Vercel.");
            });
        };

        btnLogout.onclick = () => {
            auth.signOut().then(() => location.reload());
        };

        auth.onAuthStateChanged(user => {
            if (user) renderApp(user);
        });

        function renderApp(user) {
            authOverlay.classList.add('hidden');
            appContent.classList.remove('hidden');
            userNameDisp.innerText = user.displayName;
            loadData();
        }

        // --- 4. DATA LOGIC ---
        function loadData() {
            const localData = localStorage.getItem('dorobo_tx_data');
            transactions = localData ? JSON.parse(localData) : [];
            updateUI();
        }

        function addTransaction() {
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            
            if (!desc || !amount) {
                const alerts = { id: "Isi data dengan benar!", en: "Fill data correctly!", zh: "请正确填写数据！", ja: "データを正しく入力してください！", ru: "Заполните данные правильно!" };
                return alert(alerts[currentLang]);
            }

            const newTx = { id: Date.now(), desc, amount, date: new Date().toLocaleDateString() };
            transactions.unshift(newTx);
            localStorage.setItem('dorobo_tx_data', JSON.stringify(transactions));
            
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            
            updateUI();
            generateAISuggestion(desc, amount);
        }

        function updateUI() {
            listContainer.innerHTML = '';
            let total = 0;
            const currencyStr = i18n[currentLang].currency;

            transactions.forEach(tx => {
                total += tx.amount;
                const div = document.createElement('div');
                div.className = "flex justify-between items-center p-3 bg-zinc-900 rounded-xl border border-zinc-800 hover:border-zinc-600 transition";
                div.innerHTML = `
                    <div>
                        <p class="font-semibold text-white">${tx.desc}</p>
                        <p class="text-xs text-zinc-500">${tx.date}</p>
                    </div>
                    <p class="font-bold text-yellow-400">${currencyStr} ${tx.amount.toLocaleString()}</p>
                `;
                listContainer.appendChild(div);
            });

            balanceDisp.innerText = `${currencyStr} ${total.toLocaleString()}`;
            updateChart();
        }

        // --- 5. AI LOGIC (Backend Integration) ---
        async function generateAISuggestion(desc, amount) {
            const loadingTexts = {
                id: "Dorobo sedang menganalisis dompetmu...",
                en: "Dorobo is analyzing your wallet...",
                zh: "Dorobo 正在分析你的钱包...",
                ja: "Doroboが財布を分析中...",
                ru: "Dorobo анализирует ваш кошелек..."
            };
            
            aiDisp.innerText = loadingTexts[currentLang] || "Loading...";

            try {
                const response = await fetch('/api/insight', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: desc, amount: amount, language: currentLang })
                });

                const data = await response.json();
                
                if (response.ok) {
                    aiDisp.innerText = data.suggestion; 
                } else {
                    aiDisp.innerText = "Error: " + data.suggestion;
                }
            } catch (error) {
                console.error("Gagal mengambil insight AI:", error);
                const errTexts = {
                    id: "Gagal terhubung ke server Dorobo. (Pastikan jalan di Vercel Local)",
                    en: "Failed to connect to Dorobo server.",
                    zh: "无法连接到 Dorobo 服务器。",
                    ja: "Doroboサーバーへの接続に失敗しました。",
                    ru: "Не удалось подключиться к серверу Dorobo."
                };
                aiDisp.innerText = errTexts[currentLang] || "Error connection.";
            }
        }

        // --- 6. CHART LOGIC ---
        let myChart;
        function updateChart() {
            const ctx = document.getElementById('financeChart').getContext('2d');
            const labels = transactions.slice(0, 7).map(t => t.desc).reverse();
            const data = transactions.slice(0, 7).map(t => t.amount).reverse();

            if (myChart) myChart.destroy();
            
            Chart.defaults.color = '#a1a1aa';
            Chart.defaults.borderColor = '#27272a';

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.length ? labels : ['0'],
                    datasets: [{
                        label: i18n[currentLang].chart,
                        data: data.length ? data : [0],
                        borderColor: '#facc15',
                        backgroundColor: 'rgba(250, 204, 21, 0.15)',
                        pointBackgroundColor: '#facc15',
                        pointBorderColor: '#09090b',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: { 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#27272a' } },
                        x: { grid: { display: false } }
                    } 
                }
            });
        }

        // Initialize default language
        applyLanguage();
    </script>
</body>
</html>
